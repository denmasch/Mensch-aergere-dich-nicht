# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/madn-server

jobs:
  dotnet-build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Publish Windows (x64)
      run: |
        dotnet publish ./MadnClient/MadnClient.csproj \
          -c Release \
          -r win-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -o ./release-artifacts/windows

    - name: Publish Linux (x64)
      run: |
        dotnet publish ./MadnClient/MadnClient.csproj \
          -c Release \
          -r linux-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -o ./release-artifacts/linux
    - name: Copy Shared Files
      run: |
        cp docker-compose.yml ./release-artifacts/windows/
        cp madn.py ./release-artifacts/windows/
        cp docker-compose.yml ./release-artifacts/linux/
        cp madn.py ./release-artifacts/linux/
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: madn-release
        path: ./release-artifacts/

  docker-build-push:
    needs: dotnet-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:    
      contents: read 
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./MadnServer/Dockerfile 
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

